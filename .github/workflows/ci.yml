name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

# Default to least-privilege; jobs that need more (e.g. bump-version) opt in.
permissions:
  contents: read

jobs:
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # The fuzz crate is a standalone workspace excluded from the root build, so a
  # normal `cargo build` never compiles it — API drift in wfl could silently
  # break every fuzz target. This job type-checks the targets against the current
  # API on stable (libFuzzer/nightly is only needed to actually *run* them).
  fuzz-check:
    name: Fuzz targets compile
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry and target directory
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          shared-key: fuzz-check-cache
      - name: Type-check fuzz targets against the current API
        run: cargo check --manifest-path fuzz/Cargo.toml

  clippy-and-test:
    name: Build, Test, Clippy
    runs-on: ubuntu-latest
    needs: fmt
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache Cargo registry and target directory for faster builds
      - name: Cache Cargo registry and target directory
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-cache

      # Build debug version first (for development workflow compatibility)
      - name: Build (Debug)
        run: cargo build --verbose

      # Build release version (required for integration tests)
      - name: Build (Release)
        run: cargo build --release --verbose

      # Concurrency Phase 0 (PR-0a) gate: prove the panic-strategy gate is live.
      # The `#[cfg(panic = "abort")] compile_error!` in src/lib.rs must fail the
      # build when panic=abort is forced (via --config so Cargo actually compiles
      # the crate with -C panic=abort). If this build SUCCEEDS the gate is not
      # enforced and catch_unwind fault isolation would be a phantom control.
      - name: Assert panic=abort is rejected
        run: |
          set +e
          output=$(cargo build --release --config 'profile.release.panic="abort"' --quiet 2>&1)
          status=$?
          set -e
          # The gate must fail the build *with our specific compile_error*, not
          # merely error out for some unrelated reason.
          if [ "$status" -eq 0 ] || ! grep -Fq 'WFL requires panic = "unwind"' <<<"$output"; then
            printf '%s\n' "$output"
            echo "::error::panic=abort was not rejected by the src/lib.rs compile_error gate"
            exit 1
          fi
          echo "panic=abort correctly rejected by the compile_error gate"

      # Run tests across the WHOLE workspace (root package + wflpkg + wfl-lsp),
      # so the CI aggregate is a true full-workspace baseline. Previously this
      # was `cargo test` (root package only), which silently skipped wflpkg's
      # tests. (integration tests have access to the release binary)
      - name: Run Tests
        run: cargo test --workspace --verbose

      # Build LSP to catch Send/Sync regressions
      - name: Build LSP
        run: cargo build -p wfl-lsp --verbose

      # Run LSP tests
      - name: Run LSP Tests
        run: cargo test -p wfl-lsp --verbose

      # Run Clippy for code quality
      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  # Cross-platform integration test verification
  integration-tests:
    name: Integration Tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: fmt
    # The password-hashing tests exercise deliberately slow, memory/CPU-hard
    # KDFs (Argon2/scrypt/PBKDF2). Built unoptimized by `cargo test`, they take
    # meaningful time on the slower Windows runner, which combined with the cold
    # release build was exceeding the previous 15-minute limit.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Cache Cargo registry and target directory for faster builds
      - name: Cache Cargo registry and target directory
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: integration-${{ matrix.os }}

      # Build release version (required for integration tests)
      - name: Build Release Binary
        run: cargo build --release --verbose

      # Verify release binary exists (platform-specific paths)
      - name: Verify Release Binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ ! -f "target/release/wfl" ]; then
            echo "::error::Release binary not found at target/release/wfl"
            exit 1
          fi
          echo "✓ Release binary found: target/release/wfl"

      - name: Verify Release Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          if (!(Test-Path "target/release/wfl.exe")) {
            Write-Host "::error::Release binary not found at target/release/wfl.exe"
            exit 1
          }
          Write-Host "✓ Release binary found: target/release/wfl.exe"

      # Run integration tests specifically
      - name: Run Integration Tests
        run: cargo test --test split_functionality --verbose

      # Run all integration tests to ensure comprehensive coverage
      - name: Run All Integration Tests
        run: cargo test --test '*' --verbose

  # Database integration tests against live PostgreSQL and MariaDB servers.
  # SQLite database tests need no services and already run everywhere via
  # `cargo test`; this job exercises the env-gated PostgreSQL/MariaDB paths.
  database-tests:
    name: Database Tests (PostgreSQL + MariaDB)
    runs-on: ubuntu-latest
    needs: fmt
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wfl
          POSTGRES_PASSWORD: wfl
          POSTGRES_DB: wfl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wfl"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mariadb:
        image: mariadb:11
        env:
          MARIADB_USER: wfl
          MARIADB_PASSWORD: wfl
          MARIADB_DATABASE: wfl_test
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      WFL_TEST_POSTGRES_URL: postgres://wfl:wfl@localhost:5432/wfl_test
      WFL_TEST_MYSQL_URL: mysql://wfl:wfl@localhost:3306/wfl_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target directory
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: database-tests

      - name: Run Database Tests
        run: cargo test --test database_test --verbose

  # Run WFL test programs to verify the interpreter works correctly
  run-wfl-programs:
    name: Run WFL Programs
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: fmt
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Cache Cargo registry and target directory for faster builds
      - name: Cache Cargo registry and target directory
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wfl-programs-${{ matrix.os }}

      # Build release version
      - name: Build Release Binary
        run: cargo build --release --verbose

      # Run WFL programs (Linux/macOS)
      - name: Run WFL Programs (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          #!/bin/bash
          # Note: Do not use 'set -e' as arithmetic operations like ((var++)) return 1 when var is 0
          
          WFL_BINARY="./target/release/wfl"
          TESTPROGRAMS_DIR="./TestPrograms"
          TIMEOUT_SECONDS=30
          
          # Declare associative array for skip patterns with reasons
          # Most web-server tests carry a "// CI-SKIP: <reason>" first line and are
          # skipped via that directive; the list below covers the remaining cases.
          # Intentional-error programs are asserted by scripts/run_integration_tests.sh.
          declare -A SKIP_REASONS=(
            ["circular_"]="intentional circular-include error (asserted by run_integration_tests.sh)"
            ["module_include_circular"]="intentional circular-include error (asserted by run_integration_tests.sh)"
            ["module_helper"]="helper module, not standalone"
            ["scoped.wfl"]="intentionally references an undefined variable (asserted by run_integration_tests.sh)"
            ["test_redefinition_error"]="intentional redefinition error (asserted by run_integration_tests.sh)"
            ["test_assertion_fix"]="intentionally failing assertions (asserted by run_integration_tests.sh)"
          )
          ERROR_EXAMPLES_REASON="expected to fail (error example)"
          
          passed=0
          failed=0
          skipped=0
          timed_out=0
          failed_files=""
          
          echo "=== Running WFL Test Programs ==="
          echo ""
          
          # Find all .wfl files
          while IFS= read -r -d '' file; do
            filename=$(basename "$file")
            relative_path="${file#./}"
            
            # Check for CI-SKIP directive in the file
            first_line=$(head -1 "$file")
            if [[ "$first_line" == *"CI-SKIP:"* ]]; then
              ci_skip_reason=$(echo "$first_line" | sed 's/.*CI-SKIP:\s*//')
            fi
            
            # Check if file should be skipped
            skip_reason=""
            
            # Check error_examples directory first
            if [ -n "${ci_skip_reason:-}" ]; then
              skip_reason="$ci_skip_reason"
              ci_skip_reason=""
            elif [[ "$relative_path" == *"error_examples"* ]]; then
              skip_reason="$ERROR_EXAMPLES_REASON"
            else
              # Check against skip patterns
              for pattern in "${!SKIP_REASONS[@]}"; do
                if [[ "$filename" == *"$pattern"* ]]; then
                  skip_reason="${SKIP_REASONS[$pattern]}"
                  break
                fi
              done
            fi
            
            if [ -n "$skip_reason" ]; then
                echo "SKIP: $relative_path ($skip_reason)"
                skipped=$((skipped + 1))
                continue
            fi
            
            echo -n "RUN:  $relative_path ... "
            
            # Programs with describe blocks must run in test mode
            extra_flags=()
            if grep -qE '^[[:space:]]*describe "' "$file"; then
              extra_flags=(--test)
            fi
            
            # Run with timeout
            if timeout "$TIMEOUT_SECONDS" "$WFL_BINARY" "${extra_flags[@]}" "$file" > /dev/null 2>&1; then
              echo "PASS"
              passed=$((passed + 1))
            else
              exit_code=$?
              if [ $exit_code -eq 124 ]; then
                echo "TIMEOUT (${TIMEOUT_SECONDS}s)"
                timed_out=$((timed_out + 1))
              else
                echo "FAIL (exit code: $exit_code)"
              fi
              failed=$((failed + 1))
              failed_files="$failed_files\n  - $relative_path"
            fi
          done < <(find "$TESTPROGRAMS_DIR" -name "*.wfl" -print0 | sort -z)
          
          echo ""
          echo "=== Summary ==="
          echo "Passed:  $passed"
          echo "Failed:  $failed (timeouts: $timed_out)"
          echo "Skipped: $skipped"
          echo "Total:   $((passed + failed + skipped))"
          
          if [ $failed -gt 0 ]; then
            echo ""
            echo "Failed files:$failed_files"
            exit 1
          fi

      # Run WFL programs (Windows)
      - name: Run WFL Programs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          $WflBinary = Join-Path (Get-Location).Path "target\release\wfl.exe"
          $TestProgramsDir = ".\TestPrograms"
          $TimeoutSeconds = 30
          
          # Skip patterns with reasons (hashtable)
          # Most web-server tests carry a "// CI-SKIP: <reason>" first line and are
          # skipped via that directive; the list below covers the remaining cases.
          # Intentional-error programs are asserted by scripts/run_integration_tests.sh.
          $SkipReasons = @{
            "circular_" = "intentional circular-include error (asserted by run_integration_tests.sh)"
            "module_include_circular" = "intentional circular-include error (asserted by run_integration_tests.sh)"
            "module_helper" = "helper module, not standalone"
            "subprocess" = "subprocess tests use platform-dependent commands"
            "scoped.wfl" = "intentionally references an undefined variable (asserted by run_integration_tests.sh)"
            "test_redefinition_error" = "intentional redefinition error (asserted by run_integration_tests.sh)"
            "test_assertion_fix" = "intentionally failing assertions (asserted by run_integration_tests.sh)"
          }
          $ErrorExamplesReason = "expected to fail (error example)"
          
          $passed = 0
          $failed = 0
          $skipped = 0
          $timedOut = 0
          $failedFiles = @()
          
          Write-Host "=== Running WFL Test Programs ==="
          Write-Host ""
          
          # Find all .wfl files
          $wflFiles = Get-ChildItem -Path $TestProgramsDir -Filter "*.wfl" -Recurse | Sort-Object FullName
          
          foreach ($file in $wflFiles) {
            $filename = $file.Name
            # Get relative path more robustly
            $currentDir = (Get-Location).Path
            if ($file.FullName.StartsWith($currentDir)) {
              $relativePath = $file.FullName.Substring($currentDir.Length).TrimStart('\', '/')
            } else {
              $relativePath = $file.FullName
            }
            
            # Check for CI-SKIP directive in the file
            $firstLine = Get-Content $file.FullName -First 1
            $ciSkipReason = $null
            if ($firstLine -match 'CI-SKIP:\s*(.+)') {
              $ciSkipReason = $Matches[1].Trim()
            }
            
            # Check if file should be skipped
            $skipReason = $null
            
            if ($null -ne $ciSkipReason) {
              $skipReason = $ciSkipReason
            } elseif ($relativePath -like "*error_examples*") {
              $skipReason = $ErrorExamplesReason
            } else {
              # Check against skip patterns
              foreach ($pattern in $SkipReasons.Keys) {
                if ($filename -like "*$pattern*") {
                  $skipReason = $SkipReasons[$pattern]
                  break
                }
              }
            }
            
            if ($null -ne $skipReason) {
              Write-Host "SKIP: $relativePath ($skipReason)"
              $skipped++
              continue
            }
            
            Write-Host -NoNewline "RUN:  $relativePath ... "
            
            # Programs with describe blocks must run in test mode
            $extraArgs = @()
            if (Select-String -Path $file.FullName -Pattern '^\s*describe "' -Quiet) {
              $extraArgs = @("--test")
            }
            
            # Run with timeout using a job for better process control
            $job = Start-Job -ScriptBlock {
              param($binary, $filePath, $extraArgs)
              & $binary @extraArgs $filePath 2>&1 | Out-Null
              $LASTEXITCODE
            } -ArgumentList $WflBinary, $file.FullName, $extraArgs
            
            $completed = Wait-Job -Job $job -Timeout $TimeoutSeconds
            
            if ($null -eq $completed) {
              Stop-Job -Job $job
              Remove-Job -Job $job -Force
              Write-Host "TIMEOUT (${TimeoutSeconds}s)"
              $timedOut++
              $failed++
              $failedFiles += $relativePath
            } else {
              $exitCode = Receive-Job -Job $job
              Remove-Job -Job $job
              if ($exitCode -eq 0) {
                Write-Host "PASS"
                $passed++
              } else {
                Write-Host "FAIL (exit code: $exitCode)"
                $failed++
                $failedFiles += $relativePath
              }
            }
          }
          
          Write-Host ""
          Write-Host "=== Summary ==="
          Write-Host "Passed:  $passed"
          Write-Host "Failed:  $failed (timeouts: $timedOut)"
          Write-Host "Skipped: $skipped"
          Write-Host "Total:   $($passed + $failed + $skipped)"
          
          if ($failed -gt 0) {
            Write-Host ""
            Write-Host "Failed files:"
            foreach ($f in $failedFiles) {
              Write-Host "  - $f"
            }
            exit 1
          }

  # Version bumping only happens after ALL checks pass
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: [fmt, clippy-and-test, integration-tests, database-tests, run-wfl-programs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Bump version
        run: python scripts/bump_version.py --update-all

      - name: Push changes
        if: success()
        run: |
          set -eu
          BRANCH="${{ github.ref_name }}"
          # The bump commit must fast-forward main. When another commit lands on
          # main during this run (concurrent merges), the first push is rejected
          # as non-fast-forward. Re-base the bump onto the new tip and retry.
          # Because two concurrent runs can compute the same next version, we
          # reset to the fresh tip and re-run the bump so the version is derived
          # from the true current version instead of replaying a stale bump.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:"$BRANCH"; then
              echo "Pushed version bump on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt (main advanced); re-bumping from latest tip..."
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            python scripts/bump_version.py --update-all
          done
          echo "::error::Failed to push version bump after 5 attempts (main kept advancing)."
          exit 1

      - name: Tag the new version
        if: success()
        run: |
          # Fetch existing tags to avoid conflicts
          git fetch --tags

          # Extract version from version.rs
          VERSION=$(grep -oP '(?<=VERSION: &str = ")[0-9]+\.[0-9]+\.[0-9]+' src/version.rs)

          # Check if this version tag already exists
          if ! git tag -l | grep -q "^v$VERSION$"; then
            git tag -a "v$VERSION" -m "Release $VERSION"
            git push origin --tags
          else
            echo "Tag v$VERSION already exists, skipping tagging"
          fi
